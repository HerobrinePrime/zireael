<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>黄汤茶</title>
		<script type="text/javascript" src="js/jquery.mim.js"></script>
		<script type="text/javascript">
    		$(function(){
    			var leaves = $(".leaf")
    		var a=0;
    		var is_collect=false
    		var packing = $("#packing_front")
    		for (var i = 0; i < leaves.length; i++) {			
    			$(leaves[i]).bind("touchstart",function(e){
    			});
    			$(leaves[i]).bind("touchmove",function(e){
    				$(this).css("left",e.touches[0].clientX)
    				$(this).css("top",e.touches[0].clientY)
    				if(e.touches[0].clientX>250&&e.touches[0].clientX<720){
    					if(e.touches[0].clientY>900&&e.touches[0].clientY<1600){
    						is_collect=true;
    						}
    					}
    			})
    			$(leaves[i]).bind("touchend",function(e){
    				if(is_collect==true){
    					$(this).css("display","none")
    					collect();
    				}	
    			})
    		}
    		
    		function collect(){	
    			
    			a+=0.2;
    			$("#packing_front").css("opacity",a)
    			if(a==0.2){
    				document.getElementById("line_1").style.opacity=0;
    				$("#line_1").css("display","none");
    			}
    			if(a==1){
    				document.getElementById("line_2").style.opacity=1;
    				$("#line_2").css("display","block");
    				$("#packing_front").click(function(){
    					location.href = "./QR Code.html";
    				});
    			}
    		}
    		 		
    		});

		
    		
    	</script>
		<style type="text/css">


		body,html{
            	margin: 0px;
            	width: 100%;
            	height: 100%;
        	}
		*{

			touch-action:none;

			touch-action:pan-y;

		}
        	body{
        		background-image: url(res/picture-2/bg.png);
        		background-repeat: no-repeat;
        		background-size:100% 100%;
        	}

            .screen{
            	position: absolute;
            	top: 0%;
            	height: 100%;
            	width: 100%;
            }
            #leaf_1{
            	position: absolute;
            	top: 10%;
            	left: 15%;
            }
             #leaf_2{
            	position: absolute;
            	top: 20%;
            	left: 15%;
            }
             #leaf_3{
            	position: absolute;
            	top: 12%;
            	left: 45%;
            }
             #leaf_4{
            	position: absolute;
            	top: 10%;
            	left: 65%;
            }
             #leaf_5{
            	position: absolute;
            	top: 22%;
            	left: 75%;
            }

            #return{
				height: 150px;
				width: 150px;
				position: fixed;
				top: -20px;
            }
            .packing{
            	position: absolute;
            	top: 40%;
            	left: 50%;
            	transform: translateX(-50%);
            }
            #packing_front{
            	opacity: 0;
            	z-index: 2;
            }
            .leaf{
            	z-index: 6;
            	display: block;
            	position: absolute;
            	transform: translate(-50%,-50%);
            }
            .line{
            	position: absolute;
            	top: 30%;
            	left: 50%;
            	
            	
            	transform: translateX(-50%);
            	color: white;
            	font-size: 80px;
            	font-family: "黑体";
            	
            	
            }
		</style>
	</head>
	<body style="overflow:hidden">
		<div class="screen" >
			<img class="leaf" id="leaf_1" src="res/picture-2/leaf-1.png" />
			<img class="leaf" id="leaf_2" src="res/picture-2/leaf-2.png"/>
			<img class="leaf" id="leaf_3" src="res/picture-2/leaf-3.png" />
			<img class="leaf" id="leaf_4" src="res/picture-2/leaf-4.png" />
			<img class="leaf" id="leaf_5" src="res/picture-2/leaf-5.png" />
		</div>
		<div class="screen">
			<div class="line" id="line_1" style="display: block;">将茶叶拖入袋中以完成制作</div>
			<div class="line" id="line_2" style="display: none;">恭喜你完成了黄汤茶的制作</div>

			<img class="packing" src="res/picture-2/packing-1.png" />
			<img class="packing" id="packing_front" src="res/picture-2/packing-2.png" />
		</div>
	</body>
</html>
