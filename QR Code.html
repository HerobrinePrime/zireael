<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>QR Code</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.js"></script>
    <style type="text/css">
        body,html{
            	margin: 0px;
            	width: 100%;
            	height: 100%;
        	}
		*{

			touch-action:none;

			touch-action:pan-y;

		}
        	body{
        		background-image: url(res/huangtangcha/backgroundwithyuncai.png);
        		background-repeat: no-repeat;
        		background-size:100% 100%;
        	}
            .screen{
            	position: absolute;
            	top: 0%;
            	height: 100%;
            	width: 100%;
            }
            .codebox{
                position: absolute;
                border-radius: 10%;
                background-color: aliceblue;
                left: 45%;
                top: 35%;
                height: 0vh;
                width: 0vw;
                text-align: center;
            }
            .codeboxin{
                animation: in 2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
            }
            @keyframes in{
                0%{
                    left: 45%;
                    top: 35%;
                    height: 0vh;
                    width: 0vw;
                }
                55%{
                    left: 57%;
                    top: 7%;
                    height: 33vh;
                    width: 40vw;
                }
                100%{
                    left: 12.5%;
                    top: 25%;
                    height: 60vh;
                    width: 75vw;
                }
            }
            .touxiang{
                position: relative;
                height: 150px;
                width: 150px;
                left: -1.5%;
                top: -75px;
                opacity: 0;
            }
            .touxianga{
                position: relative;
                height: 0px;
                width: 0px;
                left: -1.5%;
                top: -75px;
                opacity: 0;
                animation: touxiang 1.5s 2s forwards;
            }
            @keyframes touxiang{
                0%{
                    opacity: 0;
                    height: 0px;
                    width: 0px;
                }
                90%{
                    opacity: 1;
                    height: 165px;
                    width: 165px;
                }
                100%{
                    opacity: 1;
                    height: 150px;
                    width: 150px;
                }
            }
            .shuangyun1 {
                position: absolute;
                height: 100%;
                width: 100%;
                top: 0vh;
                left: 100vw;
                /* z-index: 211; */
            }

            .shuangyundo1 {
                animation: shuangyundo1 15s linear 2s infinite forwards;
            }

            @keyframes shuangyundo1 {
                0% {
                    left: 100vw;
                }
                100% {
                    left: -100vw;
                }
            }

            .QRCode{
                position: absolute;
                background-color: burlywood;
                height: 175px;
                width: 175px;
                left: 40%;
                margin: auto;
                top: 27%;
                /* bottom: 0; */
                left: 0;
                right: 0;
                border-radius: 10%;
                opacity: 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .QRCode img{
                display: block;
                height: 80%;
                width: 80%;
            }
            .QRCodea{
                animation: qrcode 1s 2.5s forwards;
            }
            @keyframes qrcode{
                0%{
                    opacity: 0;
                }
                100%{
                    opacity: 1;
                }
            }
    </style>
</head>
<body>
    <div class="screen">
        <img id="shuangyun1" class="shuangyun1" src="res/huangtangcha/shuangyun.png">
        <div id="codebox" class="codebox">
            <img id="touxiang" class="touxiang" src="res/huangtangcha/tubiao.png">
            <div id="QRCode" class="QRCode">
                <img src="./res/code.png" >
            </div>
        </div>
    </div>
</body>
<script>
     $(function(){
            $("#shuangyun1").addClass("shuangyundo1");
            $("#codebox").addClass("codeboxin");
            $("#touxiang").addClass("touxianga");
            $("#QRCode").addClass("QRCodea");
        })
</script>
</html>
